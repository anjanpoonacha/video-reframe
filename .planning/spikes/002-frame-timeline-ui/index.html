<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spike 002: Frame Timeline UI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #16161f;
  --surface-2: #1e1e2a;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.3);
  --success: #34d399;
  --danger: #f87171;
}
body {
  font-family: -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; padding: 16px;
  max-width: 480px; margin: 0 auto;
}
h1 { font-size: 18px; margin-bottom: 4px; }
.subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 16px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.btn {
  padding: 12px 20px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: var(--accent); color: white; width: 100%;
}
.btn:disabled { opacity: 0.4; }
.btn-danger { background: var(--danger); }
.btn-small { width: auto; padding: 8px 14px; font-size: 12px; }
#fileInput { display: none; }

/* Preview area */
.preview-container { position: relative; margin-bottom: 12px; }
#previewCanvas {
  width: 100%; border-radius: 8px; background: #000;
  display: block;
}
.frame-info {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7); padding: 4px 8px;
  border-radius: 4px; font-size: 11px; color: white;
}

/* Timeline */
.timeline-container {
  position: relative; padding: 8px 0;
}
.timeline-track {
  display: flex; gap: 1px; overflow-x: auto;
  padding: 4px 0; scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.timeline-track::-webkit-scrollbar { display: none; }

.frame-thumb {
  flex-shrink: 0; width: 44px; height: 78px;
  border-radius: 4px; cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.1s; scroll-snap-align: center;
  position: relative; overflow: hidden;
}
.frame-thumb.active {
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  transform: scale(1.05);
}
.frame-thumb.selected {
  border-color: var(--success);
}
.frame-thumb.deleted {
  opacity: 0.3;
  border-color: var(--danger);
}
.frame-thumb.deleted::after {
  content: '×';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--danger); font-weight: bold;
}
.frame-thumb canvas { width: 100%; height: 100%; display: block; }

/* Playhead */
.playhead-indicator {
  text-align: center; font-size: 12px; color: var(--text-dim);
  margin: 8px 0;
}

/* Controls */
.controls {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
}

/* Selection mode */
.mode-indicator {
  font-size: 11px; padding: 4px 8px; border-radius: 4px;
  background: var(--surface-2); color: var(--text-dim);
  display: inline-block; margin-bottom: 8px;
}
.mode-indicator.active { background: var(--accent-glow); color: var(--accent); }

.status { font-size: 12px; color: var(--text-dim); margin: 8px 0; min-height: 16px; }
.hidden { display: none; }
</style>
</head>
<body>

<h1>Spike 002: Frame Timeline UI</h1>
<p class="subtitle">Validates: intuitive filmstrip browse + frame selection</p>

<div class="card">
  <button class="btn" onclick="document.getElementById('fileInput').click()">Load Video</button>
  <input type="file" id="fileInput" accept="video/*">
  <div class="status" id="loadStatus"></div>
</div>

<div class="card hidden" id="mainUI">
  <!-- Preview -->
  <div class="preview-container">
    <canvas id="previewCanvas"></canvas>
    <div class="frame-info" id="frameInfo">Frame 0 / 0</div>
  </div>

  <!-- Mode -->
  <div>
    <span class="mode-indicator active" id="modeNav">Navigate</span>
    <span class="mode-indicator" id="modeSelect">Multi-Select</span>
  </div>

  <!-- Timeline filmstrip -->
  <div class="timeline-container">
    <div class="timeline-track" id="timeline"></div>
  </div>

  <div class="playhead-indicator" id="playhead">0:00.0 / 0:00.0</div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-small" id="prevBtn">← Prev</button>
    <button class="btn btn-small" id="nextBtn">Next →</button>
    <button class="btn btn-small" id="toggleSelectBtn">Toggle Select Mode</button>
    <button class="btn btn-small btn-danger" id="deleteBtn">Delete Selected</button>
  </div>

  <div class="status" id="actionStatus"></div>
</div>

<script type="module">
let video = null;
let frames = []; // { time, bitmap, deleted, selected }
let currentIdx = 0;
let selectMode = false;

const THUMB_W = 44;
const THUMB_H = 78; // 9:16 aspect

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  video = document.createElement('video');
  video.muted = true;
  video.playsInline = true;
  video.preload = 'auto';
  video.src = URL.createObjectURL(file);
  await new Promise(r => video.addEventListener('loadeddata', r, { once: true }));

  document.getElementById('loadStatus').textContent = 'Extracting frames...';

  const duration = video.duration;
  const fps = 2; // 2 frames/sec for timeline
  const numFrames = Math.min(200, Math.round(duration * fps));
  const step = duration / numFrames;
  const canvas = document.createElement('canvas');
  canvas.width = THUMB_W * 2; // 2x for retina
  canvas.height = THUMB_H * 2;
  const ctx = canvas.getContext('2d');

  frames = [];
  for (let i = 0; i < numFrames; i++) {
    video.currentTime = i * step;
    await new Promise(r => video.addEventListener('seeked', r, { once: true }));
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const bitmap = await createImageBitmap(canvas);
    frames.push({ time: i * step, bitmap, deleted: false, selected: false });
  }

  document.getElementById('loadStatus').textContent = `${numFrames} frames extracted`;
  document.getElementById('loadStatus').className = 'status';
  document.getElementById('mainUI').classList.remove('hidden');
  renderTimeline();
  goToFrame(0);
});

function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';

  frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'frame-thumb';
    if (i === currentIdx) div.classList.add('active');
    if (f.selected) div.classList.add('selected');
    if (f.deleted) div.classList.add('deleted');

    const c = document.createElement('canvas');
    c.width = THUMB_W * 2;
    c.height = THUMB_H * 2;
    c.getContext('2d').drawImage(f.bitmap, 0, 0);
    div.appendChild(c);

    div.addEventListener('click', () => {
      if (selectMode && !f.deleted) {
        f.selected = !f.selected;
        div.classList.toggle('selected');
        updateStatus();
      } else {
        goToFrame(i);
      }
    });

    container.appendChild(div);
  });
}

async function goToFrame(idx) {
  if (idx < 0 || idx >= frames.length) return;
  currentIdx = idx;

  // Update active state in filmstrip
  document.querySelectorAll('.frame-thumb').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Scroll into view
  const thumbs = document.querySelectorAll('.frame-thumb');
  if (thumbs[idx]) {
    thumbs[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // Draw full-res preview
  video.currentTime = frames[idx].time;
  await new Promise(r => video.addEventListener('seeked', r, { once: true }));

  const canvas = document.getElementById('previewCanvas');
  const aspect = video.videoWidth / video.videoHeight;
  canvas.width = Math.min(480, video.videoWidth);
  canvas.height = canvas.width / aspect;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

  // Update info
  const t = frames[idx].time;
  const dur = video.duration;
  document.getElementById('frameInfo').textContent =
    `Frame ${idx + 1} / ${frames.length}${frames[idx].deleted ? ' [DELETED]' : ''}`;
  document.getElementById('playhead').textContent =
    `${formatTime(t)} / ${formatTime(dur)}`;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1);
  return `${m}:${sec.padStart(4, '0')}`;
}

function updateStatus() {
  const selectedCount = frames.filter(f => f.selected).length;
  const deletedCount = frames.filter(f => f.deleted).length;
  document.getElementById('actionStatus').textContent =
    `${selectedCount} selected · ${deletedCount} deleted`;
}

// Controls
document.getElementById('prevBtn').addEventListener('click', () => {
  let next = currentIdx - 1;
  while (next >= 0 && frames[next].deleted) next--;
  if (next >= 0) goToFrame(next);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  let next = currentIdx + 1;
  while (next < frames.length && frames[next].deleted) next++;
  if (next < frames.length) goToFrame(next);
});

document.getElementById('toggleSelectBtn').addEventListener('click', () => {
  selectMode = !selectMode;
  document.getElementById('modeNav').classList.toggle('active', !selectMode);
  document.getElementById('modeSelect').classList.toggle('active', selectMode);
  document.getElementById('actionStatus').textContent =
    selectMode ? 'Tap frames to select them' : 'Tap frames to navigate';
});

document.getElementById('deleteBtn').addEventListener('click', () => {
  frames.forEach(f => {
    if (f.selected) { f.deleted = true; f.selected = false; }
  });
  renderTimeline();
  updateStatus();
  // Skip to next non-deleted frame
  if (frames[currentIdx].deleted) {
    let next = currentIdx + 1;
    while (next < frames.length && frames[next].deleted) next++;
    if (next < frames.length) goToFrame(next);
  }
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.key === 'd' || e.key === 'Delete') document.getElementById('deleteBtn').click();
  if (e.key === 's') document.getElementById('toggleSelectBtn').click();
  if (e.key === ' ' && !selectMode) {
    frames[currentIdx].selected = !frames[currentIdx].selected;
    renderTimeline();
    updateStatus();
  }
});
</script>
</body>
</html>
