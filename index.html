<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Video Reframe</title>
</head>
<body>

<div class="header">
  <h1>Video Reframe</h1>
  <p>16:9 → 9:16 · 100% on-device · zero cost</p>
  <button class="settings-toggle" id="settingsToggle" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68 1.65 1.65 0 0 0 10 3.17V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<!-- Brand Kit Settings Panel -->
<div class="settings-panel hidden" id="brandKitPanel">
  <div class="settings-panel-header">
    <span class="settings-panel-title">Brand Kit</span>
    <button class="settings-close" id="settingsClose" aria-label="Close">✕</button>
  </div>

  <div class="settings-section">
    <label class="settings-label">Channel Name</label>
    <input type="text" class="settings-input" id="channelNameInput" placeholder="My Channel" maxlength="30">
  </div>

  <div class="settings-section">
    <label class="settings-label">Logo</label>
    <div class="logo-upload-row">
      <img id="logoPreview" class="logo-preview" alt="Logo preview" style="display:none">
      <label class="btn btn-small btn-secondary" for="logoInput">Choose File</label>
      <input type="file" id="logoInput" accept="image/png,image/svg+xml" style="display:none">
      <button class="btn btn-small btn-danger" id="logoRemove" style="display:none">Remove</button>
    </div>
  </div>

  <div class="settings-section">
    <label class="settings-label">Colors</label>
    <div class="color-row">
      <span class="color-label">Primary</span>
      <input type="color" id="primaryColorPicker" value="#ff6b35">
      <input type="text" class="color-hex" id="primaryColorHex" value="#ff6b35" maxlength="7">
    </div>
    <div class="color-row">
      <span class="color-label">Accent</span>
      <input type="color" id="accentColorPicker" value="#1a1a2e">
      <input type="text" class="color-hex" id="accentColorHex" value="#1a1a2e" maxlength="7">
    </div>
  </div>

  <div class="settings-section">
    <label class="settings-label">Logo Position</label>
    <div class="position-grid">
      <label class="position-option">
        <input type="radio" name="logoPosition" id="positionTL" value="TL" checked>
        <span>↖ Top Left</span>
      </label>
      <label class="position-option">
        <input type="radio" name="logoPosition" id="positionTR" value="TR">
        <span>↗ Top Right</span>
      </label>
      <label class="position-option">
        <input type="radio" name="logoPosition" id="positionBL" value="BL">
        <span>↙ Bottom Left</span>
      </label>
      <label class="position-option">
        <input type="radio" name="logoPosition" id="positionBR" value="BR">
        <span>↘ Bottom Right</span>
      </label>
    </div>
  </div>

  <div class="status" id="brandKitStatus"></div>
</div>

<!-- Upload -->
<div class="card" id="uploadCard">
  <label for="fileInput" class="upload-zone">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <span class="upload-text">Select Video</span>
    <span class="upload-hint">From Camera Roll or Files</span>
  </label>
  <input type="file" id="fileInput" accept="video/*,video/mp4,video/quicktime,video/mov,.mp4,.mov,.m4v">
  <div class="status" id="fileStatus"></div>
  <button class="btn btn-small btn-danger hidden" id="clearBtn">Clear &amp; Start Over</button>
</div>

<!-- Analyze (motion detection) -->
<div class="card hidden" id="analyzeCard">
  <button class="btn btn-primary" id="analyzeBtn">Detect Motion</button>
  <div class="progress-bar">
    <div class="progress-fill" id="analyzeProgress"></div>
  </div>
  <div class="status" id="analyzeStatus"></div>
</div>

<!-- Editor: Filmstrip + Crop + Delete -->
<div class="card hidden" id="editorCard">
  <div class="editor-header">
    <span class="editor-title">Edit Frames</span>
    <span class="editor-hint">Adjust auto-detected crop or mark ranges to skip</span>
  </div>

  <!-- Preview with crop overlay -->
  <div class="crop-container" id="cropContainer">
    <canvas id="sourceCanvas"></canvas>
    <div class="crop-overlay">
      <div class="crop-region" id="cropRegion"></div>
    </div>
  </div>

  <!-- Result preview (9:16) -->
  <div class="result-preview">
    <canvas id="resultCanvas"></canvas>
  </div>

  <!-- Filmstrip timeline -->
  <div class="filmstrip-container">
    <div class="filmstrip" id="filmstrip"></div>
  </div>

  <!-- Frame info + play -->
  <div class="frame-info-bar">
    <span id="frameCounter">Frame 0 / 0</span>
    <button class="btn btn-small btn-secondary" id="playPreviewBtn">▶ Play</button>
    <button class="btn btn-small btn-secondary" id="deleteKeyframeBtn" style="display:none">✕ Remove KF</button>
    <span id="frameTime">0:00</span>
  </div>

  <!-- Skip ranges -->
  <div class="skip-section">
    <div class="skip-bar" id="skipBar"></div>
    <div class="skip-controls">
      <button class="btn btn-small btn-danger" id="markStartBtn">Mark Start</button>
      <button class="btn btn-small btn-danger" id="markEndBtn">Mark End</button>
      <button class="btn btn-small btn-secondary" id="undoSkipBtn">Undo</button>
    </div>
    <div class="skip-stats" id="skipStats"></div>
  </div>
</div>

<!-- Export -->
<div class="card hidden" id="exportCard">
  <div class="export-options">
    <div class="export-option-group">
      <label class="settings-label">Duration</label>
      <select id="exportDuration" class="export-select">
        <option value="10">10 seconds</option>
        <option value="30">30 seconds</option>
        <option value="0" selected>Full video</option>
      </select>
    </div>
    <div class="export-option-group">
      <label class="settings-label">Effects</label>
      <div class="effect-toggles">
        <label class="effect-toggle"><input type="checkbox" id="effectIntro" checked><span>Intro</span></label>
        <label class="effect-toggle"><input type="checkbox" id="effectLowerThird" checked><span>Lower Third</span></label>
        <label class="effect-toggle"><input type="checkbox" id="effectWatermark" checked><span>Watermark</span></label>
      </div>
    </div>
  </div>
  <button class="btn btn-primary" id="exportBtn">Export 9:16</button>
  <div class="progress-bar">
    <div class="progress-fill" id="exportProgress"></div>
  </div>
  <div class="status" id="exportStatus"></div>
</div>

<!-- Result -->
<div class="card hidden" id="resultCard">
  <div style="font-weight:600; margin-bottom:12px">Result</div>
  <video id="outputVideo" class="output-video" controls playsinline></video>
  <div class="metrics">
    <div class="metric">
      <div class="metric-value" id="metricSize">—</div>
      <div class="metric-label">File Size</div>
    </div>
    <div class="metric">
      <div class="metric-value" id="metricTotal">—</div>
      <div class="metric-label">Total Time</div>
    </div>
    <div class="metric">
      <div class="metric-value" id="metricRes">—</div>
      <div class="metric-label">Output</div>
    </div>
  </div>
  <button class="btn btn-success" id="downloadBtn">Save Video</button>
</div>

<script type="module" src="./src/main.ts"></script>
</body>
</html>
