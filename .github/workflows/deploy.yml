name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: oven-sh/setup-bun@v2

      # Build prod (main)
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - run: bun install
        working-directory: main
      - run: bun run build
        working-directory: main
      - run: cp main/manifest.json main/dist/

      # Build v2
      - uses: actions/checkout@v4
        with:
          ref: v2
          path: v2
      - run: bun install
        working-directory: v2
      - run: bun run build
        working-directory: v2
      - run: cp v2/manifest.json v2/dist/
      - run: cp v2/benchmark.html v2/dist/ 2>/dev/null || true

      # Combine into single site
      - name: Merge builds
        run: |
          mkdir site
          cp -r main/dist/* site/
          mkdir -p site/v2
          cp -r v2/dist/* site/v2/

      # Deploy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
